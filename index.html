<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SORI · Sistema de Operaciones y Recursos Integrales</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .main-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255,255,255,0.94);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
            padding: 2rem 1.5rem;
            backdrop-filter: blur(2px);
        }

        /* Header con escudo a la izquierda del título */
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 0.75rem;
        }
        .shield-small {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
            background-color: #fef9e6;
            flex-shrink: 0;
        }
        .shield-small img {
            width: 50px;
            height: auto;
            border-radius: 50%;
        }
        .title-group h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e3a5f;
        }
        .title-group p {
            color: #2c5a7a;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* Grid 3x3 para los 9 botones */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .menu-btn {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 0.5rem;
            box-shadow: 0 12px 18px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            font-weight: 600;
            color: #1e3a5f;
            gap: 8px;
        }
        .menu-btn i {
            font-size: 2.2rem;
            color: #d4af37;
        }
        .menu-btn span {
            font-size: 0.85rem;
            font-weight: 700;
        }
        .menu-btn:hover {
            transform: translateY(-5px);
            background: #fff8ed;
            border-color: #d4af37;
            box-shadow: 0 18px 28px rgba(0,0,0,0.15);
        }

        /* Botón especial rectangular para Administrar */
        .admin-rectangle {
            grid-column: 2 / 3;
            background: #1e3a5f;
            color: white;
            border-radius: 40px;
            flex-direction: row;
            gap: 12px;
            padding: 0.8rem;
        }
        .admin-rectangle i {
            color: #d4af37;
            font-size: 1.8rem;
        }
        .admin-rectangle span {
            font-size: 1rem;
            color: white;
        }
        .admin-rectangle:hover {
            background: #143049;
            transform: translateY(-3px);
        }

        .footer-sori {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5c6f87;
            border-top: 1px solid #cddfe7;
            padding-top: 1rem;
        }

        @media (max-width: 650px) {
            .grid-buttons {
                gap: 0.8rem;
            }
            .menu-btn {
                padding: 0.8rem 0.2rem;
            }
            .menu-btn i {
                font-size: 1.5rem;
            }
            .menu-btn span {
                font-size: 0.7rem;
            }
            .admin-rectangle {
                flex-direction: column;
                gap: 5px;
            }
            .shield-small {
                width: 50px;
                height: 50px;
            }
            .shield-small img {
                width: 40px;
            }
            .title-group h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- Header con escudo a la izquierda -->
    <div class="header">
        <div class="shield-small">
            <img src="img/escudo-municipio.jpg" alt="Escudo Puerto Carreño" onerror="this.src='https://via.placeholder.com/50?text=SORI'">
        </div>
        <div class="title-group">
            <h1>SORI · Sistema de Operaciones y Recursos Integrales</h1>
            <p>Municipio de Puerto Carreño · Gestión Transparente</p>
        </div>
    </div>

    <!-- Grid 3x3 (9 botones) -->
    <div class="grid-buttons">
        <!-- Fila 1 -->
        <div class="menu-btn" data-modulo="ingresos">
            <i class="fas fa-cog"></i>
            <span>Ingresos</span>
        </div>
        <div class="menu-btn" data-modulo="predial">
            <i class="fas fa-home"></i>
            <span>Predial</span>
        </div>
        <div class="menu-btn" data-modulo="tesoreria">
            <i class="fas fa-cash-register"></i>
            <span>Tesorería</span>
        </div>

        <!-- Fila 2 -->
        <div class="menu-btn" data-modulo="presupuesto">
            <i class="fas fa-calculator"></i>
            <span>Presupuesto</span>
        </div>
        <div class="menu-btn" data-modulo="contabilidad">
            <i class="fas fa-chart-pie"></i>
            <span>Contabilidad</span>
        </div>
        <div class="menu-btn" data-modulo="contratacion">
            <i class="fas fa-file-signature"></i>
            <span>Contratación</span>
        </div>

        <!-- Fila 3 -->
        <div class="menu-btn" data-modulo="almacen">
            <i class="fas fa-warehouse"></i>
            <span>Almacén</span>
        </div>
        <div class="menu-btn" data-modulo="nomina">
            <i class="fas fa-laptop-code"></i>
            <span>Nómina</span>
        </div>
        <div class="menu-btn" data-modulo="informes">
            <i class="fas fa-print"></i>
            <span>Informes</span>
        </div>
    </div>

    <!-- Ficha rectangular para Administrar (abajo, centrada) -->
    <div style="display: flex; justify-content: center; margin-top: 1rem;">
        <div class="menu-btn admin-rectangle" data-modulo="admin">
            <i class="fas fa-key"></i>
            <span>Administrar</span>
        </div>
    </div>

    <div class="footer-sori">
        <i class="fas fa-cloud-upload-alt"></i> SORI · Plataforma segura en la nube
    </div>
</div>

<script>
    // Service Worker para Cloudflare / offline
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('install', e => {
                e.waitUntil(caches.open('sori-v1').then(cache => cache.addAll(['/','/index.html','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'])));
                self.skipWaiting();
            });
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(e => console.log("SW no registrado"));
        });
    }

    const acciones = {
        ingresos: "Módulo Ingresos: Registro de rentas, impuestos y tasas municipales.",
        predial: "Gestión de Impuesto Predial: Liquidación, histórico y cartera.",
        tesoreria: "Tesorería: Recaudos, expedición de recibos, pagos proveedores.",
        presupuesto: "Presupuesto: Apropiaciones, modificaciones, ejecución presupuestal.",
        contabilidad: "Contabilidad General: PUC, asientos contables, balances.",
        contratacion: "Contratación: Procesos de compras, contratos supervisión.",
        almacen: "Almacén e Inventarios: Entradas, salidas, bienes devolutivos.",
        nomina: "Nómina: Liquidación de sueldos, seguridad social, deducciones.",
        informes: "Informes financieros y de gestión: reportes personalizados.",
        admin: "Administración: Gestión de usuarios, roles, parámetros del sistema."
    };

    document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const modulo = btn.getAttribute('data-modulo');
            if(modulo && acciones[modulo]) {
                alert("📌 " + acciones[modulo] + "\n\n🛠️ Demo - Próximamente módulo dedicado.");
            } else {
                alert("Acceso directo a " + btn.innerText.trim());
            }
        });
    });
</script>
</body>
</html>
