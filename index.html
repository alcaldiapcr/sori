<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SORI · Sistema de Operaciones y Recursos Integrales</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .main-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.94);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
            padding: 2rem 1.5rem 2rem 1.5rem;
            backdrop-filter: blur(2px);
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #d4af37;
            display: inline-block;
            width: 100%;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1e3a5f;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #2c5a7a;
            font-weight: 600;
            margin-top: 0.2rem;
            font-size: 0.9rem;
        }

        /* NUEVO: layout circular automático sin posiciones fijas */
        .circle-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
        }

        .shield-center {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 0 5px rgba(212,175,55,0.7);
            z-index: 10;
            background-color: #fef9e6;
            margin-bottom: 2rem;
        }

        .shield-center img {
            width: 150px;
            height: auto;
            border-radius: 50%;
            object-fit: contain;
        }

        /* Grid que simula un círculo */
        .radial-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            justify-items: center;
            align-items: center;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }

        .menu-btn {
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 0.5rem;
            box-shadow: 0 12px 18px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            font-weight: 600;
            color: #1e3a5f;
            width: 100%;
            gap: 6px;
        }

        .menu-btn i {
            font-size: 2rem;
            color: #d4af37;
        }

        .menu-btn span {
            font-size: 0.8rem;
            font-weight: 700;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            background: #fff8ed;
            border-color: #d4af37;
            box-shadow: 0 18px 28px rgba(0,0,0,0.15);
            z-index: 20;
        }

        /* Orden circular de los 10 botones */
        /* Reorganizo visualmente en 4 columnas */
        .btn-0 { grid-column: 2 / 3; }  /* Ingresos (arriba centro) */
        .btn-1 { grid-column: 4 / 5; grid-row: 1; }  /* Predial (derecha) */
        .btn-2 { grid-column: 4 / 5; grid-row: 2; }  /* Tesorería */
        .btn-3 { grid-column: 4 / 5; grid-row: 3; }  /* Presupuesto */
        .btn-4 { grid-column: 3 / 4; grid-row: 4; }  /* Contabilidad (abajo centro) */
        .btn-5 { grid-column: 2 / 3; grid-row: 4; }  /* Contratación */
        .btn-6 { grid-column: 1 / 2; grid-row: 3; }  /* Almacén */
        .btn-7 { grid-column: 1 / 2; grid-row: 2; }  /* Nómina */
        .btn-8 { grid-column: 1 / 2; grid-row: 1; }  /* Informes */
        .btn-9 { grid-column: 2 / 3; grid-row: 1; }  /* Administrar */

        @media (max-width: 650px) {
            .radial-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            /* En móvil pierde forma circular pero gana orden en columnas */
            .btn-0, .btn-1, .btn-2, .btn-3, .btn-4,
            .btn-5, .btn-6, .btn-7, .btn-8, .btn-9 {
                grid-column: auto;
                grid-row: auto;
            }
            .shield-center {
                width: 120px;
                height: 120px;
                margin-bottom: 1.5rem;
            }
            .shield-center img {
                width: 100px;
            }
            .menu-btn {
                padding: 0.7rem 0.2rem;
            }
            .menu-btn i {
                font-size: 1.5rem;
            }
            .menu-btn span {
                font-size: 0.7rem;
            }
        }

        .footer-sori {
            text-align: center;
            margin-top: 2.2rem;
            font-size: 0.7rem;
            color: #5c6f87;
            border-top: 1px solid #cddfe7;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>SORI · Sistema de Operaciones y Recursos Integrales</h1>
        <p>Municipio de Puerto Carreño · Gestión Transparente</p>
    </div>

    <div class="circle-container">
        <div class="shield-center">
            <img src="img/escudo-municipio.jpg" alt="Escudo Puerto Carreño" onerror="this.src='https://via.placeholder.com/170?text=SORI'">
        </div>

        <div class="radial-buttons">
            <!-- 1. Rueda dentada: Ingresos -->
            <div class="menu-btn btn-0" data-modulo="ingresos">
                <i class="fas fa-cog"></i>
                <span>Ingresos</span>
            </div>
            <!-- 2. Casa: Predial -->
            <div class="menu-btn btn-1" data-modulo="predial">
                <i class="fas fa-home"></i>
                <span>Predial</span>
            </div>
            <!-- 3. Caja con $: Tesorería -->
            <div class="menu-btn btn-2" data-modulo="tesoreria">
                <i class="fas fa-cash-register"></i>
                <span>Tesorería</span>
            </div>
            <!-- 4. Ficha con números: Presupuesto -->
            <div class="menu-btn btn-3" data-modulo="presupuesto">
                <i class="fas fa-calculator"></i>
                <span>Presupuesto</span>
            </div>
            <!-- 5. Calculadora: Contabilidad -->
            <div class="menu-btn btn-4" data-modulo="contabilidad">
                <i class="fas fa-chart-pie"></i>
                <span>Contabilidad</span>
            </div>
            <!-- 6. Documento con check: Contratación -->
            <div class="menu-btn btn-5" data-modulo="contratacion">
                <i class="fas fa-file-signature"></i>
                <span>Contratación</span>
            </div>
            <!-- 7. Carrito montacargas: Almacén -->
            <div class="menu-btn btn-6" data-modulo="almacen">
                <i class="fas fa-warehouse"></i>
                <span>Almacén</span>
            </div>
            <!-- 8. Persona sentada en computador: Nómina -->
            <div class="menu-btn btn-7" data-modulo="nomina">
                <i class="fas fa-laptop-code"></i>
                <span>Nómina</span>
            </div>
            <!-- 9. Impresora con papel: Informes -->
            <div class="menu-btn btn-8" data-modulo="informes">
                <i class="fas fa-print"></i>
                <span>Informes</span>
            </div>
            <!-- 10. Llave: Administrar -->
            <div class="menu-btn btn-9" data-modulo="admin">
                <i class="fas fa-key"></i>
                <span>Administrar</span>
            </div>
        </div>
    </div>

    <div class="footer-sori">
        <i class="fas fa-cloud-upload-alt"></i> SORI · Plataforma segura en la nube
    </div>
</div>

<script>
    // Service Worker para Cloudflare / offline
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('install', e => {
                e.waitUntil(caches.open('sori-v1').then(cache => cache.addAll(['/','/index.html','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'])));
                self.skipWaiting();
            });
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(e => console.log("SW no registrado"));
        });
    }

    const acciones = {
        ingresos: "Módulo Ingresos: Registro de rentas, impuestos y tasas municipales.",
        predial: "Gestión de Impuesto Predial: Liquidación, histórico y cartera.",
        tesoreria: "Tesorería: Recaudos, expedición de recibos, pagos proveedores.",
        presupuesto: "Presupuesto: Apropiaciones, modificaciones, ejecución presupuestal.",
        contabilidad: "Contabilidad General: PUC, asientos contables, balances.",
        contratacion: "Contratación: Procesos de compras, contratos supervisión.",
        almacen: "Almacén e Inventarios: Entradas, salidas, bienes devolutivos.",
        nomina: "Nómina: Liquidación de sueldos, seguridad social, deducciones.",
        informes: "Informes financieros y de gestión: reportes personalizados.",
        admin: "Administración: Gestión de usuarios, roles, parámetros del sistema."
    };

    document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const modulo = btn.getAttribute('data-modulo');
            if(modulo && acciones[modulo]) {
                alert("📌 " + acciones[modulo] + "\n\n🛠️ Demo - Próximamente módulo dedicado.");
            } else {
                alert("Acceso directo a " + btn.innerText.trim());
            }
        });
    });
</script>
</body>
</html>
