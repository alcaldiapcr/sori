<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SORI · Sistema de Operaciones y Recursos Integrales</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .main-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.94);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
            padding: 2rem 1.5rem 2rem 1.5rem;
            backdrop-filter: blur(2px);
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #d4af37;
            display: inline-block;
            width: 100%;
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1e3a5f;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #2c5a7a;
            font-weight: 600;
            margin-top: 0.2rem;
            font-size: 0.9rem;
        }

        .circle-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 550px;
            margin: 20px 0;
        }

        /* Escudo central */
        .shield-center {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), inset 0 0 0 5px rgba(212,175,55,0.7);
            z-index: 10;
            background-color: #fef9e6;
        }
        .shield-center img {
            width: 170px;
            height: auto;
            border-radius: 50%;
            object-fit: contain;
        }

        /* Botones radiales */
        .radial-buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 480px;
            height: 480px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .menu-btn {
            position: absolute;
            width: 95px;
            height: 95px;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px rgba(0,0,0,0.1);
            cursor: pointer;

            --scale: 1;
            transform: translate(-50%, -50%) scale(var(--scale));

            transition: all 0.2s ease;
            text-align: center;
            pointer-events: auto;
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            font-weight: 600;
            color: #1e3a5f;
            text-decoration: none;
            gap: 6px;
            z-index: 5;
        }
        .menu-btn i {
            font-size: 2.3rem;
            color: #d4af37;
            margin-bottom: 5px;
        }
        .menu-btn span {
            font-size: 0.8rem;
            font-weight: 700;
        }
        .menu-btn small {
            font-size: 0.65rem;
            color: #4b6e8a;
        }
        .menu-btn:hover {
            --scale: 1.05;
            background: #fff8ed;
            border-color: #d4af37;
            box-shadow: 0 18px 28px rgba(0,0,0,0.15);
            z-index: 20;
        }

        /* Posiciones circulares para 10 botones */
        .btn-0 { top: 6%; left: 50%; transform: translate(-50%, -50%); }

        .btn-8 { top: 14%; left: 30%; transform: translate(-50%, -50%); }
        .btn-9 { top: 14%; left: 70%; transform: translate(-50%, -50%); }

        .btn-7 { top: 26%; left: 15%; transform: translate(-50%, -50%); }
        .btn-1 { top: 26%; left: 85%; transform: translate(-50%, -50%); }

        .btn-6 { top: 55%; left: 4%; transform: translate(-50%, -50%); }
        .btn-2 { top: 55%; left: 96%; transform: translate(-50%, -50%); }

        .btn-5 { top: 88%; left: 22%; transform: translate(-50%, -50%); }
        .btn-3 { top: 88%; left: 78%; transform: translate(-50%, -50%); }

        .btn-4 { top: 98%; left: 50%; transform: translate(-50%, -50%); }

        @media (max-width: 850px) {
            .radial-buttons { width: 400px; height: 400px; }
            .menu-btn { width: 90px; height: 90px; }
            .menu-btn i { font-size: 1.8rem; }
            .menu-btn span { font-size: 0.7rem; }
            .shield-center { width: 150px; height: 150px; }
            .shield-center img { width: 130px; }
        }
        @media (max-width: 650px) {

            .radial-buttons {
                position: static;
                transform: none;
                width: 100%;
                height: auto;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                justify-items: center;
            }

            .menu-btn {
                position: static;
                transform: none;
                width: 80px;
                height: 80px;
            }

            .menu-btn i { font-size: 1.5rem; }
            .menu-btn span { font-size: 0.65rem; }
            .menu-btn small { display: none; }

            .shield-center {
                width: 120px;
                height: 120px;
            }
        }

        .footer-sori {
            text-align: center;
            margin-top: 2.2rem;
            font-size: 0.7rem;
            color: #5c6f87;
            border-top: 1px solid #cddfe7;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>SORI · Sistema de Operaciones y Recursos Integrales</h1>
        <p>Municipio de Puerto Carreño · Gestión Transparente</p>
    </div>

    <div class="circle-container">
        <div class="shield-center">
            <img src="img/escudo-municipio.jpg" alt="Escudo Puerto Carreño" onerror="this.src='https://via.placeholder.com/170?text=SORI'">
        </div>

        <div class="radial-buttons">
            <!-- 1. Rueda dentada: Ingresos -->
            <div class="menu-btn btn-0" data-modulo="ingresos">
                <i class="fas fa-cog"></i>
                <span>Ingresos</span>
            </div>
            <!-- 2. Casa: Predial -->
            <div class="menu-btn btn-1" data-modulo="predial">
                <i class="fas fa-home"></i>
                <span>Predial</span>
            </div>
            <!-- 3. Caja con $: Tesorería -->
            <div class="menu-btn btn-2" data-modulo="tesoreria">
                <i class="fas fa-cash-register"></i>
                <span>Tesorería</span>
            </div>
            <!-- 4. Ficha con números: Presupuesto -->
            <div class="menu-btn btn-3" data-modulo="presupuesto">
                <i class="fas fa-calculator"></i>
                <span>Presupuesto</span>
            </div>
            <!-- 5. Calculadora: Contabilidad -->
            <div class="menu-btn btn-4" data-modulo="contabilidad">
                <i class="fas fa-chart-pie"></i>
                <span>Contabilidad</span>
            </div>
            <!-- 6. Documento con check: Contratación -->
            <div class="menu-btn btn-5" data-modulo="contratacion">
                <i class="fas fa-file-signature"></i>
                <span>Contratación</span>
            </div>
            <!-- 7. Carrito montacargas: Almacén -->
            <div class="menu-btn btn-6" data-modulo="almacen">
                <i class="fas fa-warehouse"></i>
                <span>Almacén</span>
            </div>
            <!-- 8. Persona sentada en computador: Nómina -->
            <div class="menu-btn btn-7" data-modulo="nomina">
                <i class="fas fa-laptop-code"></i>
                <span>Nómina</span>
            </div>
            <!-- 9. Impresora con papel: Informes -->
            <div class="menu-btn btn-8" data-modulo="informes">
                <i class="fas fa-print"></i>
                <span>Informes</span>
            </div>
            <!-- 10. Llave: Administrar -->
            <div class="menu-btn btn-9" data-modulo="admin">
                <i class="fas fa-key"></i>
                <span>Administrar</span>
            </div>
        </div>
    </div>

    <div class="footer-sori">
        <i class="fas fa-cloud-upload-alt"></i> SORI · Plataforma segura en la nube
    </div>
</div>

<script>
    // Service Worker para Cloudflare / offline
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('install', e => {
                e.waitUntil(caches.open('sori-v1').then(cache => cache.addAll(['/','/index.html','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'])));
                self.skipWaiting();
            });
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(e => console.log("SW no registrado"));
        });
    }

    const acciones = {
        ingresos: "Módulo Ingresos: Registro de rentas, impuestos y tasas municipales.",
        predial: "Gestión de Impuesto Predial: Liquidación, histórico y cartera.",
        tesoreria: "Tesorería: Recaudos, expedición de recibos, pagos proveedores.",
        presupuesto: "Presupuesto: Apropiaciones, modificaciones, ejecución presupuestal.",
        contabilidad: "Contabilidad General: PUC, asientos contables, balances.",
        contratacion: "Contratación: Procesos de compras, contratos supervisión.",
        almacen: "Almacén e Inventarios: Entradas, salidas, bienes devolutivos.",
        nomina: "Nómina: Liquidación de sueldos, seguridad social, deducciones.",
        informes: "Informes financieros y de gestión: reportes personalizados.",
        admin: "Administración: Gestión de usuarios, roles, parámetros del sistema."
    };

    document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const modulo = btn.getAttribute('data-modulo');
            if(modulo && acciones[modulo]) {
                alert("📌 " + acciones[modulo] + "\n\n🛠️ Demo - Próximamente módulo dedicado.");
            } else {
                alert("Acceso directo a " + btn.innerText.trim());
            }
        });
    });
</script>
</body>
</html>
